services:
  postgres:
    image: postgres:16-alpine
    container_name: goster-iot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goster_iot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - goster_iot_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goster_iot"]
      interval: 10s
      timeout: 5s
      retries: 5

  goster-iot:
    image: docker.io/nhir/goster-iot:latest
    container_name: goster-iot
    restart: unless-stopped
    command: ["sh", "-c", "./goster-iot db migrate && exec ./goster-iot serve"]
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  goster_iot_postgres:
