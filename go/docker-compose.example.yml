services:
  goster-iot:
    image: nhir/goster-iot:latest
    container_name: goster-iot
    restart: unless-stopped
    command: [ "sh", "-c", "./goster-iot db migrate && exec ./goster-iot serve" ]
    env_file:
      - .env

    #    ports:
    #      - "8080:8080"
    #      - "8081:8081"

    networks:
      - goster-iot
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s


networks:
  goster-iot:
    driver: bridge
    name: goster-iot