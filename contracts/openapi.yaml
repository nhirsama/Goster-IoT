openapi: 3.1.0
info:
  title: Goster IoT 管理 API
  version: 0.4.0
  summary: 面向当前已实现管理能力的前后端契约。
  description: |
    本契约基于当前系统行为与数据模型整理。
    它定义了稳定的 `/api/v1` 命名空间用于前后端解耦，
    并作为管理端唯一受支持的 HTTP 接口。

    设计原则：
    - 契约优先
    - 向后安全演进
    - 通过 `extensions` 与 `meta` 扩展负载
  x-current-logic:
    metrics_default_range: 1h
    metrics_min_valid_timestamp_ms: 1672531200000
    auth_primary_mode: cookie_session

servers:
  - url: http://localhost:8080
    description: 本地开发环境

tags:
  - name: Auth
  - name: Device
  - name: Metrics
  - name: User
  - name: Tenant
    description: 多租户管理
  - name: Group
    description: 设备分组管理

security:
  - CookieSession: []
  - BearerAuth: []

paths:
  /api/v1/auth/captcha/config:
    get:
      tags: [Auth]
      operationId: getCaptchaConfig
      summary: 获取前端验证码服务配置。
      security: []
      responses:
        '200':
          description: 验证码配置。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptchaConfigResponse'

  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: 注册用户账号。
      description: |
        与现有注册行为保持一致：
        - 首个注册用户获得 `Admin` 权限。
        - 后续用户默认获得 `None` 权限。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: 登录并创建认证会话。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功。
          headers:
            Set-Cookie:
              schema:
                type: string
              description: 由服务端设置的会话 Cookie。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: 登出当前会话。
      responses:
        '204':
          description: 已登出。
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: 获取当前已认证用户信息。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: 当前用户信息。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/devices:
    get:
      tags: [Device]
      operationId: listDevices
      summary: 按认证状态列出设备。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceStatusFilter'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/GroupID'
      responses:
        '200':
          description: 设备列表。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/devices/{uuid}:
    get:
      tags: [Device]
      operationId: getDevice
      summary: 获取设备详情。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '200':
          description: 设备详情。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Device]
      operationId: deleteDevice
      summary: 永久删除设备及其关联数据。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '204':
          description: 已删除。
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/devices/{uuid}/approve:
    post:
      tags: [Device]
      operationId: approveDevice
      summary: 审批待认证设备。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '200':
          description: 已通过审批。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/devices/{uuid}/revoke:
    post:
      tags: [Device]
      operationId: revokeDevice
      summary: 拒绝待认证设备或撤销已认证设备。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '200':
          description: 已撤销/已拒绝。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/devices/{uuid}/unblock:
    post:
      tags: [Device]
      operationId: unblockDevice
      summary: 将设备从已拒绝/已撤销状态移回待认证状态。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '200':
          description: 已解除阻断。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/devices/{uuid}/token/refresh:
    post:
      tags: [Device]
      operationId: refreshDeviceToken
      summary: 刷新设备令牌。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '200':
          description: 令牌已刷新。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/devices/{uuid}/commands:
    post:
      tags: [Device]
      operationId: enqueueDeviceCommand
      summary: 将下行指令推入设备发送队列。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCommandRequest'
      responses:
        '200':
          description: 指令已入队。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceCommandEnqueueResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/metrics/{uuid}:
    get:
      tags: [Metrics]
      operationId: getMetrics
      summary: 查询设备指标点数据。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
        - $ref: '#/components/parameters/MetricsRange'
        - $ref: '#/components/parameters/StartMs'
        - $ref: '#/components/parameters/EndMs'
      responses:
        '200':
          description: 指标点数据。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users:
    get:
      tags: [User]
      operationId: listUsers
      summary: 列出账号。
      description: |
        当前租户的 `tenant_admin` 可访问。返回系统账号列表，并附带账号在当前租户下的成员角色（如存在）。
      responses:
        '200':
          description: 账号列表。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/invitations:
    get:
      tags: [Tenant]
      operationId: listPendingTenantInvitations
      summary: 列出当前账号收到的待处理租户邀请。
      description: |
        返回当前登录账号尚未处理且未过期的租户邀请。
      responses:
        '200':
          description: 租户邀请列表。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantInvitationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/invitations/{invitation_id}/accept:
    post:
      tags: [Tenant]
      operationId: acceptTenantInvitation
      summary: 接受租户邀请。
      description: |
        仅邀请接收账号本人可接受该邀请。接受成功后账号会加入邀请对应租户。
      parameters:
        - $ref: '#/components/parameters/InvitationID'
      responses:
        '200':
          description: 邀请已接受。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantInvitationActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/invitations/{invitation_id}/reject:
    post:
      tags: [Tenant]
      operationId: rejectTenantInvitation
      summary: 拒绝租户邀请。
      description: |
        仅邀请接收账号本人可拒绝该邀请。
      parameters:
        - $ref: '#/components/parameters/InvitationID'
      responses:
        '200':
          description: 邀请已拒绝。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantInvitationActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tenants:
    get:
      tags: [Tenant]
      operationId: listTenants
      summary: 列出当前账号可访问的租户。
      description: |
        账号可以加入多个租户。普通账号只返回自己加入的租户；当前租户 `tenant_admin` 可用于租户管理界面。
      responses:
        '200':
          description: 租户列表。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Tenant]
      operationId: createTenant
      summary: 创建新租户。
      description: |
        已认证账号可创建新租户；创建者会自动成为该租户的 `tenant_admin`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: 租户已创建。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/tenants/{tenant_id}:
    get:
      tags: [Tenant]
      operationId: getTenant
      summary: 获取租户详情。
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: 租户详情。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Tenant]
      operationId: updateTenant
      summary: 更新租户信息。
      description: |
        仅该租户的 `tenant_admin` 可更新租户主档。
      parameters:
        - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
      responses:
        '200':
          description: 租户已更新。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tenants/{tenant_id}/users:
    get:
      tags: [Tenant]
      operationId: listTenantUsers
      summary: 列出租户用户。
      description: |
        返回指定租户的所有账号及其角色。仅该租户的 `tenant_admin` 可访问。
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: 租户用户列表。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Tenant]
      operationId: inviteTenantUser
      summary: 邀请用户加入租户。
      description: |
        创建租户邀请并分配目标租户角色；用户接受邀请后才会成为租户成员。
        仅该租户的 `tenant_admin` 可操作。
      parameters:
        - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteTenantUserRequest'
      responses:
        '201':
          description: 邀请已创建。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteTenantUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/tenants/{tenant_id}/invitations:
    post:
      tags: [Tenant]
      operationId: createTenantInvitation
      summary: 创建租户邀请。
      description: |
        创建租户邀请。仅该租户的 `tenant_admin` 可操作。
        该接口与 `POST /api/v1/tenants/{tenant_id}/users` 的邀请语义一致，
        但响应体直接返回创建出的邀请对象。
      parameters:
        - $ref: '#/components/parameters/TenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteTenantUserRequest'
      responses:
        '201':
          description: 邀请已创建。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantInvitationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tenants/{tenant_id}/users/{username}:
    delete:
      tags: [Tenant]
      operationId: removeTenantUser
      summary: 从租户移除用户。
      description: |
        仅该租户的 `tenant_admin` 可操作。
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Username'
      responses:
        '204':
          description: 用户已移除。
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/groups:
    get:
      tags: [Group]
      operationId: listDeviceGroups
      summary: 列出设备分组。
      description: |
        返回当前租户下的所有设备分组。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 设备分组列表。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceGroupListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Group]
      operationId: createDeviceGroup
      summary: 创建设备分组。
      description: |
        在当前租户下创建新的设备分组。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceGroupRequest'
      responses:
        '201':
          description: 分组已创建。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/groups/{group_id}:
    get:
      tags: [Group]
      operationId: getDeviceGroup
      summary: 获取分组详情。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/GroupIDPath'
      responses:
        '200':
          description: 分组详情。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceGroupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Group]
      operationId: updateDeviceGroup
      summary: 更新分组信息。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/GroupIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceGroupRequest'
      responses:
        '200':
          description: 分组已更新。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Group]
      operationId: deleteDeviceGroup
      summary: 删除设备分组。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/GroupIDPath'
      responses:
        '204':
          description: 分组已删除。
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/groups/{group_id}/devices:
    get:
      tags: [Group]
      operationId: listGroupDevices
      summary: 列出分组内的设备。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/GroupIDPath'
      responses:
        '200':
          description: 分组设备列表。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Group]
      operationId: addDeviceToGroup
      summary: 添加设备到分组。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/GroupIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDeviceToGroupRequest'
      responses:
        '201':
          description: 设备已添加。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/groups/{group_id}/devices/{uuid}:
    delete:
      tags: [Group]
      operationId: removeDeviceFromGroup
      summary: 从分组移除设备。
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/GroupIDPath'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '204':
          description: 设备已移除。
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    CookieSession:
      type: apiKey
      in: cookie
      name: goster_session
      description: 当前主要认证方式。
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 为未来基于令牌的认证预留。

  parameters:
    DeviceUUID:
      name: uuid
      in: path
      required: true
      schema:
        type: string
        minLength: 1

    Username:
      name: username
      in: path
      required: true
      schema:
        type: string
        minLength: 1

    DeviceStatusFilter:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [all, authenticated, pending, refused, revoked]
        default: authenticated
      description: |
        认证状态筛选：
        - authenticated -> `AuthenticateStatus=0`
        - refused -> `AuthenticateStatus=1`
        - pending -> `AuthenticateStatus=2`
        - revoked -> `AuthenticateStatus=4`
        - all -> 不筛选

    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100

    MetricsRange:
      name: range
      in: query
      required: false
      schema:
        type: string
        enum: [1h, 6h, 24h, 7d, all]
        default: 1h

    StartMs:
      name: start_ms
      in: query
      required: false
      schema:
        type: integer
        format: int64
      description: 显式指定开始时间戳（毫秒）。与 `end_ms` 同时提供时会覆盖 `range`。

    EndMs:
      name: end_ms
      in: query
      required: false
      schema:
        type: integer
        format: int64
      description: 显式指定结束时间戳（毫秒）。与 `start_ms` 同时提供时会覆盖 `range`。

    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
      description: |
        当前请求租户上下文。未传时后端回退为 `tenant_legacy`。

    GroupID:
      name: group_id
      in: query
      required: false
      schema:
        type: string
      description: 设备分组过滤参数（当前阶段仅保留契约位，后续实现组级过滤）。

    TenantID:
      name: tenant_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: 租户 ID

    InvitationID:
      name: invitation_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: 租户邀请 ID

    GroupIDPath:
      name: group_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: 设备分组 ID

  responses:
    BadRequest:
      description: 无效请求。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: 需要认证或会话已过期。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: 权限不足。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 资源不存在。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: 资源已存在或状态冲突。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ApiResponseBase:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: integer
          description: 0 表示成功，非 0 表示错误。
          example: 0
        message:
          type: string
          example: ok
        request_id:
          type: string
          description: 用于链路追踪的关联 ID。
          example: req_20260312_abcdef
        meta:
          type: object
          additionalProperties: true
          description: 可扩展元数据。

    ErrorDetail:
      type: object
      required: [type]
      properties:
        type:
          type: string
          example: validation_error
        field:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [error]
          properties:
            data:
              type: 'null'
            error:
              $ref: '#/components/schemas/ErrorDetail'

    PermissionType:
      type: integer
      enum: [0, 1, 2, 3]
      description: |
        0=无权限, 1=只读, 2=读写, 3=管理员
      x-enumNames: [None, ReadOnly, ReadWrite, Admin]

    AuthStatusType:
      type: integer
      enum: [0, 1, 2, 3, 4]
      description: |
        0=已认证, 1=已拒绝, 2=待认证, 3=未知, 4=已撤销
      x-enumNames: [Authenticated, Refused, Pending, Unknown, Revoked]

    DeviceRuntimeStatus:
      type: integer
      enum: [0, 1, 2]
      description: 0=离线, 1=在线, 2=延迟
      x-enumNames: [Offline, Online, Delayed]

    MetricType:
      type: integer
      enum: [1, 2, 4]
      description: 1=温度, 2=湿度, 4=光照
      x-enumNames: [Temperature, Humidity, Lux]

    CaptchaConfig:
      type: object
      required: [provider, enabled]
      properties:
        provider:
          type: string
          enum: [none, turnstile]
        enabled:
          type: boolean
        site_key:
          type: string
          nullable: true
        extensions:
          type: object
          additionalProperties: true

    CaptchaConfigResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/CaptchaConfig'

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          minLength: 8
          maxLength: 128
        email:
          type: string
          format: email
          nullable: true
        captcha_token:
          type: string
          nullable: true
        extensions:
          type: object
          additionalProperties: true

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        remember_me:
          type: boolean
          default: false
        captcha_token:
          type: string
          nullable: true
        extensions:
          type: object
          additionalProperties: true

    AuthSession:
      type: object
      required: [username, permission, authenticated]
      properties:
        username:
          type: string
        email:
          type: string
          nullable: true
        permission:
          $ref: '#/components/schemas/PermissionType'
          description: 当前租户角色派生出的有效权限：tenant_ro=1，tenant_rw=2，tenant_admin=3。
        current_role:
          $ref: '#/components/schemas/TenantRole'
          nullable: true
          description: 当前生效租户下的账号角色。
        active_tenant:
          type: string
          description: 当前生效租户（由 `X-Tenant-Id` 或服务端默认策略解析）。
        tenant_roles:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/TenantRole'
          description: 账号加入的所有租户及其角色。
        authenticated:
          type: boolean
          default: true
        extensions:
          type: object
          additionalProperties: true

    AuthSessionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/AuthSession'

    DeviceMetadata:
      type: object
      required: [name, hw_version, sw_version, config_version, sn, mac, created_at, authenticate_status]
      properties:
        name:
          type: string
        hw_version:
          type: string
        sw_version:
          type: string
        config_version:
          type: string
        sn:
          type: string
        mac:
          type: string
        created_at:
          type: string
          format: date-time
        token:
          type: string
          nullable: true
        authenticate_status:
          $ref: '#/components/schemas/AuthStatusType'
        extensions:
          type: object
          additionalProperties: true

    DeviceRuntime:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/DeviceRuntimeStatus'
        status_text:
          type: string
          enum: [offline, online, delayed]
        last_seen_ms:
          type: integer
          format: int64
          nullable: true
        extensions:
          type: object
          additionalProperties: true

    DeviceRecord:
      type: object
      required: [uuid, meta]
      properties:
        uuid:
          type: string
        meta:
          $ref: '#/components/schemas/DeviceMetadata'
        runtime:
          $ref: '#/components/schemas/DeviceRuntime'
        extensions:
          type: object
          additionalProperties: true

    PageMeta:
      type: object
      required: [page, size, returned]
      properties:
        page:
          type: integer
        size:
          type: integer
        returned:
          type: integer
        total:
          type: integer
          nullable: true
        has_next:
          type: boolean
          nullable: true

    DeviceListData:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DeviceRecord'
        page:
          $ref: '#/components/schemas/PageMeta'
        extensions:
          type: object
          additionalProperties: true

    DeviceListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/DeviceListData'

    DeviceDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/DeviceRecord'

    ActionResult:
      type: object
      required: [action, target]
      properties:
        action:
          type: string
          example: approve_device
        target:
          type: string
          example: 07f5e...
        success:
          type: boolean
          default: true
        extensions:
          type: object
          additionalProperties: true

    ActionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/ActionResult'

    RefreshTokenData:
      type: object
      required: [uuid, token]
      properties:
        uuid:
          type: string
        token:
          type: string
        rotated_at:
          type: string
          format: date-time
          nullable: true
        extensions:
          type: object
          additionalProperties: true

    RefreshTokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/RefreshTokenData'

    DeviceCommandName:
      type: string
      enum: [config_push, ota_data, action_exec, screen_wy]
      description: 设备下行指令名称。

    DeviceCommandStatus:
      type: string
      enum: [queued, sent, acked, failed]
      description: 设备下行指令状态。

    DeviceCommandRequest:
      type: object
      required: [command]
      properties:
        command:
          $ref: '#/components/schemas/DeviceCommandName'
        payload:
          type: object
          additionalProperties: true
          description: 指令负载（原样转发给设备侧）。
          nullable: true

    DeviceCommandEnqueueData:
      type: object
      required: [command_id, uuid, command, cmd_id, status]
      properties:
        command_id:
          type: integer
          format: int64
        uuid:
          type: string
        command:
          $ref: '#/components/schemas/DeviceCommandName'
        cmd_id:
          type: integer
          description: 协议 CmdID 的十进制表示。
          example: 515
        status:
          $ref: '#/components/schemas/DeviceCommandStatus'
        enqueued_at:
          type: string
          format: date-time
          nullable: true
        extensions:
          type: object
          additionalProperties: true

    DeviceCommandEnqueueResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/DeviceCommandEnqueueData'

    MetricPoint:
      type: object
      required: [ts, value, type]
      properties:
        ts:
          type: integer
          format: int64
          description: Unix 时间戳（毫秒）。
        value:
          type: number
          format: float
        type:
          $ref: '#/components/schemas/MetricType'
        extensions:
          type: object
          additionalProperties: true

    MetricsData:
      type: object
      required: [uuid, points]
      properties:
        uuid:
          type: string
        range:
          type: string
          nullable: true
          enum: [1h, 6h, 24h, 7d, all]
        start_ms:
          type: integer
          format: int64
          nullable: true
        end_ms:
          type: integer
          format: int64
          nullable: true
        points:
          type: array
          items:
            $ref: '#/components/schemas/MetricPoint'
        extensions:
          type: object
          additionalProperties: true

    MetricsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/MetricsData'

    User:
      type: object
      required: [username, created_at]
      properties:
        username:
          type: string
        permission:
          $ref: '#/components/schemas/PermissionType'
          deprecated: true
          description: 兼容字段，表示当前租户角色派生出的有效权限；新实现应优先使用 `tenant_role`。
        tenant_role:
          $ref: '#/components/schemas/TenantRole'
          nullable: true
          description: 账号在当前租户下的角色；未加入当前租户时为空。
        created_at:
          type: string
          format: date-time
        extensions:
          type: object
          additionalProperties: true

    UserListData:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        extensions:
          type: object
          additionalProperties: true

    UserListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/UserListData'

    # 租户相关 Schema
    TenantRole:
      type: string
      enum: [tenant_admin, tenant_rw, tenant_ro]
      description: |
        租户角色：
        - tenant_admin: 租户管理员（可管理租户内用户和设备）
        - tenant_rw: 租户读写（可操作设备和数据）
        - tenant_ro: 租户只读（仅查看）

    TenantStatus:
      type: string
      enum: [active, suspended, archived]
      description: |
        租户状态：
        - active: 活跃
        - suspended: 暂停
        - archived: 归档

    Tenant:
      type: object
      required: [id, name, status, created_at]
      properties:
        id:
          type: string
          description: 租户 ID
        name:
          type: string
          description: 租户名称
        status:
          $ref: '#/components/schemas/TenantStatus'
        role:
          $ref: '#/components/schemas/TenantRole'
          description: 当前账号在该租户下的角色；仅列表接口保证返回。
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties: true
          description: 租户元数据

    TenantListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [items, total]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/Tenant'
                total:
                  type: integer
                  minimum: 0

    TenantResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/Tenant'

    CreateTenantRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: 租户名称
        status:
          $ref: '#/components/schemas/TenantStatus'
        meta:
          type: object
          additionalProperties: true

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        status:
          $ref: '#/components/schemas/TenantStatus'
        meta:
          type: object
          additionalProperties: true

    TenantUser:
      type: object
      required: [tenant_id, username, role, created_at]
      properties:
        tenant_id:
          type: string
        username:
          type: string
        role:
          $ref: '#/components/schemas/TenantRole'
        created_at:
          type: string
          format: date-time

    TenantUserListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [items, total]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/TenantUser'
                total:
                  type: integer
                  minimum: 0

    TenantInvitationStatus:
      type: string
      enum: [pending, accepted, rejected, expired]
      description: |
        租户邀请状态：
        - pending: 待处理
        - accepted: 已接受
        - rejected: 已拒绝
        - expired: 已过期

    TenantInvitation:
      type: object
      required: [id, tenant_id, username, role, invited_by, status, expires_at, created_at, updated_at]
      properties:
        id:
          type: string
          description: 租户邀请 ID
        tenant_id:
          type: string
          description: 邀请加入的租户 ID
        username:
          type: string
          description: 被邀请账号用户名
        role:
          $ref: '#/components/schemas/TenantRole'
        invited_by:
          type: string
          description: 邀请发起账号用户名
        status:
          $ref: '#/components/schemas/TenantInvitationStatus'
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantInvitationListData:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TenantInvitation'
        total:
          type: integer
          minimum: 0

    TenantInvitationListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/TenantInvitationListData'

    TenantInvitationResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/TenantInvitation'

    TenantInvitationActionResult:
      type: object
      required: [action, success]
      properties:
        action:
          type: string
          enum: [accept, reject]
        success:
          type: boolean
          default: true

    TenantInvitationActionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/TenantInvitationActionResult'

    InviteTenantUserRequest:
      type: object
      required: [username, role]
      properties:
        username:
          type: string
          minLength: 1
        role:
          $ref: '#/components/schemas/TenantRole'

    AddTenantUserRequest:
      deprecated: true
      allOf:
        - $ref: '#/components/schemas/InviteTenantUserRequest'

    InviteTenantUserResult:
      type: object
      required: [action, target, invitation, success]
      properties:
        action:
          type: string
          enum: [invite_tenant_user]
        target:
          type: string
          description: 被邀请账号用户名
        invitation:
          $ref: '#/components/schemas/TenantInvitation'
        success:
          type: boolean
          default: true

    InviteTenantUserResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/InviteTenantUserResult'

    # 设备分组相关 Schema
    DeviceGroup:
      type: object
      required: [id, tenant_id, name, created_at]
      properties:
        id:
          type: string
          description: 分组 ID
        tenant_id:
          type: string
          description: 所属租户 ID
        name:
          type: string
          description: 分组名称
        description:
          type: string
          nullable: true
          description: 分组描述
        device_count:
          type: integer
          minimum: 0
          description: 设备数量
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DeviceGroupListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [items, total, page, size]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/DeviceGroup'
                total:
                  type: integer
                  minimum: 0
                page:
                  type: integer
                  minimum: 1
                size:
                  type: integer
                  minimum: 1

    DeviceGroupResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/DeviceGroup'

    CreateDeviceGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: 分组名称
        description:
          type: string
          maxLength: 500
          nullable: true
          description: 分组描述

    UpdateDeviceGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type: string
          maxLength: 500
          nullable: true

    AddDeviceToGroupRequest:
      type: object
      required: [uuid]
      properties:
        uuid:
          type: string
          minLength: 1
          description: 设备 UUID
