openapi: 3.0.3
info:
  title: Goster IoT HTTP API
  version: 0.1.0
  description: |
    Multi-tenant HTTP API contract for the web backend.
    This file includes implemented endpoints and planned tenant/group management endpoints.
servers:
  - url: http://localhost:8080
security:
  - cookieAuth: []
tags:
  - name: Auth
  - name: Devices
  - name: Metrics
  - name: Tenants
  - name: Groups
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: goster_session
  parameters:
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: false
      description: Active tenant id. If omitted, backend falls back to tenant_legacy.
      schema:
        type: string
    DeviceUUID:
      name: uuid
      in: path
      required: true
      schema:
        type: string
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        request_id:
          type: string
        error:
          type: object
          properties:
            type:
              type: string
            field:
              type: string
    MeData:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          nullable: true
        permission:
          type: integer
        active_tenant:
          type: string
        authenticated:
          type: boolean
    Tenant:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, disabled]
    DeviceGroup:
      type: object
      required: [id, tenant_id, name]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        description:
          type: string
paths:
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/MeData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/devices:
    get:
      tags: [Devices]
      summary: List devices in current tenant scope
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: status
          in: query
          schema:
            type: string
            enum: [all, authenticated, pending, refused, revoked]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
        - name: group_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Device list
        '403':
          description: Scope denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/devices/{uuid}:
    get:
      tags: [Devices]
      summary: Get device detail in tenant scope
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '200':
          description: Device detail
        '404':
          description: Not found in current scope
    delete:
      tags: [Devices]
      summary: Delete device
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      responses:
        '204':
          description: Deleted
        '403':
          description: Permission denied
        '404':
          description: Not found
  /api/v1/devices/{uuid}/commands:
    post:
      tags: [Devices]
      summary: Enqueue downlink command in tenant scope
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                payload:
                  type: object
      responses:
        '200':
          description: Queued
        '404':
          description: Device not found in scope
  /api/v1/metrics/{uuid}:
    get:
      tags: [Metrics]
      summary: Query metrics in tenant scope
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/DeviceUUID'
        - name: range
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Metrics data
        '404':
          description: Device not found in scope
  /api/v1/tenants:
    get:
      tags: [Tenants]
      summary: List visible tenants (planned)
      responses:
        '200':
          description: Tenant list
    post:
      tags: [Tenants]
      summary: Create tenant (planned)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
  /api/v1/tenants/{tenant_id}/groups:
    get:
      tags: [Groups]
      summary: List device groups in tenant (planned)
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group list
    post:
      tags: [Groups]
      summary: Create device group in tenant (planned)
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceGroup'
      responses:
        '201':
          description: Created
