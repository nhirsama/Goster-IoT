name: goster-iot

services:
  core:
    image: nhir/goster-iot:latest
    restart: unless-stopped
    init: true
    env_file:
      - path: .env
        required: false
    command: [ "sh", "-c", "/app/goster-iot db migrate && exec /app/goster-iot serve" ]
    environment:
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      DB_PATH: ${DB_PATH:-/data/data.db}
      DB_DSN: ${DB_DSN:-}
      WEB_HTTP_ADDR: :8080
      AUTHBOSS_ROOT_URL: ${AUTHBOSS_ROOT_URL:-http://localhost:8080}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      API_CORS_ALLOW_ORIGINS: ${API_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PROTOCOL_INGRESS_TOKEN: ${PROTOCOL_INGRESS_TOKEN:-change-me}
      APP_ENV: ${APP_ENV:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-}
      CF_SITE_KEY: ${CF_SITE_KEY:-}
      CF_SECRET_KEY: ${CF_SECRET_KEY:-}
    volumes:
      - ./data/core:/data
    ports:
      - "${CORE_HTTP_BIND:-0.0.0.0}:${CORE_HTTP_PORT:-8080}:8080"
    networks:
      - goster-iot
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readiness >/dev/null 2>&1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  protocol-ingress:
    image: nhir/goster-iot-ingress:latest
    restart: unless-stopped
    init: true
    env_file:
      - path: .env
        required: false
    environment:
      PROTOCOL_INGRESS_ENV: ${APP_ENV:-prod}
      PROTOCOL_INGRESS_HTTP_ADDR: :8090
      PROTOCOL_INGRESS_CORE_ENDPOINT: http://core:8080
      PROTOCOL_INGRESS_CORE_TOKEN: ${PROTOCOL_INGRESS_TOKEN:-change-me}
      PROTOCOL_INGRESS_CUSTOM_TCP_ENABLED: ${PROTOCOL_INGRESS_CUSTOM_TCP_ENABLED:-true}
      PROTOCOL_INGRESS_CUSTOM_TCP_ADDR: :8081
      PROTOCOL_INGRESS_MQTT_ENABLED: ${PROTOCOL_INGRESS_MQTT_ENABLED:-false}
      PROTOCOL_INGRESS_MQTT_MODE: ${PROTOCOL_INGRESS_MQTT_MODE:-embedded}
      PROTOCOL_INGRESS_MQTT_LISTEN_ADDR: ${PROTOCOL_INGRESS_MQTT_LISTEN_ADDR:-:1883}
      PROTOCOL_INGRESS_MQTT_AUTH_MODE: ${PROTOCOL_INGRESS_MQTT_AUTH_MODE:-client_password_token}
      PROTOCOL_INGRESS_MQTT_QOS: ${PROTOCOL_INGRESS_MQTT_QOS:-1}
      PROTOCOL_INGRESS_MQTT_BASE_TOPIC: ${PROTOCOL_INGRESS_MQTT_BASE_TOPIC:-goster/v1}
      PROTOCOL_INGRESS_MQTT_DOWNLINK_TOPIC: ${PROTOCOL_INGRESS_MQTT_DOWNLINK_TOPIC:-goster/v1/{tenant}/{uuid}/downlink}
      PROTOCOL_INGRESS_MQTT_BROKER_URL: ${PROTOCOL_INGRESS_MQTT_BROKER_URL:-tcp://mqtt:1883}
      PROTOCOL_INGRESS_MQTT_USERNAME: ${PROTOCOL_INGRESS_MQTT_USERNAME:-}
      PROTOCOL_INGRESS_MQTT_PASSWORD: ${PROTOCOL_INGRESS_MQTT_PASSWORD:-}
    depends_on:
      core:
        condition: service_healthy
    ports:
      - "${INGRESS_TCP_BIND:-0.0.0.0}:${INGRESS_TCP_PORT:-8081}:8081"
      - "${INGRESS_MQTT_BIND:-0.0.0.0}:${INGRESS_MQTT_PORT:-1883}:1883"
    networks:
      - goster-iot
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8090/readyz >/dev/null 2>&1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  goster-iot:
    driver: bridge
    name: goster-iot
